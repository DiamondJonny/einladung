<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poster 2 · Geburtstagseinladung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent:#ff3d8b; --accent2:#7c5cff; }
  body { font-family:'Nunito',system-ui,sans-serif; }
  .poster {
    position: relative; width: 1080px; height: 1528px; overflow: hidden;
    background:
      radial-gradient(circle at 20% 12%, #ffd86b55, transparent 38%),
      radial-gradient(circle at 85% 22%, #4fd6ff55, transparent 40%),
      radial-gradient(circle at 75% 88%, #ff7bd055, transparent 40%),
      linear-gradient(160deg,#7b5cff 0%, #b14df0 38%, #ff5da2 72%, #ff9e57 100%);
  }
  .bg { position:absolute; inset:0; overflow:hidden; }

  /* Wimpelkette oben */
  .bunting { position:absolute; top:0; left:0; right:0; height:90px; display:flex; }
  .flag { flex:1; height:74px; clip-path:polygon(0 0,100% 0,50% 100%); }

  .balloon { position:absolute; border-radius:50% 50% 48% 48%; }
  .balloon::after { content:""; position:absolute; left:50%; top:100%; width:2px; height:80px; background:rgba(255,255,255,.35); transform:translateX(-50%); }
  .balloon::before { content:""; position:absolute; left:26%; top:18%; width:22%; height:24%; background:rgba(255,255,255,.7); border-radius:50%; }

  .confetti { position:absolute; width:18px; height:26px; border-radius:3px; opacity:.92; }
  .deco { position:absolute; line-height:1; filter:drop-shadow(0 6px 8px rgba(0,0,0,.2)); }

  .panel {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:760px; background:#fff; border-radius:44px; padding:58px 56px 44px; text-align:center;
    box-shadow:0 44px 100px rgba(0,0,0,.32); border:6px solid #fff;
  }
  .panel::before { content:""; position:absolute; top:0; left:0; right:0; height:16px; border-radius:40px 40px 0 0;
    background:linear-gradient(90deg,var(--accent),#ffb23e,#5be3a0,#48c6ff,var(--accent2),var(--accent)); }
  .title { font-family:'Fredoka',sans-serif; font-weight:700; font-size:66px; line-height:1.08; margin-bottom:6px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:30px; color:#5a5a72; font-weight:800; margin-bottom:24px; }
  .qrwrap { display:inline-block; padding:18px; border-radius:30px; background:linear-gradient(135deg,#fff0f7,#eef0ff);
    box-shadow:inset 0 0 0 3px #f0e9ff; }
  .qr { width:480px; height:480px; display:block; }
  .scan { font-family:'Fredoka',sans-serif; font-size:36px; font-weight:600; color:var(--accent2); margin-top:20px; }
  .row { font-size:46px; margin-top:8px; letter-spacing:6px; }
  .url { font-size:24px; color:#9a9ab0; margin-top:4px; }
</style>
</head>
<body>
  <div class="poster" id="poster">
    <div class="bg" id="bg"></div>
    <div class="bunting" id="bunting"></div>

    <div class="panel">
      <div class="title">🎉 Du bist<br>eingeladen! 🎉</div>
      <div class="sub">🥳 zu meiner Geburtstagsfeier 🥳</div>
      <div class="qrwrap"><img class="qr" src="qr.svg" alt="QR-Code" /></div>
      <div class="scan">📷 Scan mich für deine Einladung!</div>
      <div class="row">🎈🎂🎁🎈</div>
      <div class="url">diamondjonny.github.io/einladung</div>
    </div>
  </div>
<script>
(function(){
  const bg=document.getElementById('bg');
  const colors=['#ff3d8b','#7c5cff','#ffb23e','#48c6ff','#5be3a0','#ff7b7b','#c77dff','#ff8fc8','#ffd86b'];

  // Wimpelkette
  const bunting=document.getElementById('bunting');
  for(let i=0;i<14;i++){const f=document.createElement('div');f.className='flag';f.style.background=colors[i%colors.length];bunting.appendChild(f);}

  // viele Luftballons rund um die Karte (dichter als V1)
  const spots=[[20,150,165],[150,470,135],[30,860,175],[120,1230,150],[250,200,100],[300,1080,105],
    [860,120,175],[930,460,140],[820,840,165],[905,1230,150],[700,210,100],[760,1090,105],
    [440,40,120],[560,1410,120],[40,560,95],[940,720,95]];
  spots.forEach((s,i)=>{const [x,y,w]=s;const b=document.createElement('div');b.className='balloon';
    const c=colors[i%colors.length];
    b.style.background='radial-gradient(circle at 30% 28%, #ffffffcc, '+c+' 62%)';
    b.style.left=x+'px';b.style.top=y+'px';b.style.width=w+'px';b.style.height=(w*1.25)+'px';
    b.style.transform='rotate('+((i%5)-2)*5+'deg)';bg.appendChild(b);});

  // Konfetti gestreut
  const conf=[[120,300],[300,260],[700,300],[940,330],[200,700],[880,680],[160,1050],[860,1050],
    [360,150],[640,170],[470,1200],[610,1240],[260,520],[800,520],[120,1380],[930,1380],[520,90],[540,1470]];
  conf.forEach((p,i)=>{const [x,y]=p;const d=document.createElement('div');d.className='confetti';
    d.style.left=x+'px';d.style.top=y+'px';d.style.background=colors[(i+2)%colors.length];
    d.style.transform='rotate('+(i*37%180)+'deg)';bg.appendChild(d);});

  // Eck-Emojis
  const decos=[['🎊',40,90,90],['🎁',940,1380,86],['⭐',60,1300,70],['🎊',960,80,90],['🥳',500,1360,0]];
  decos.forEach(d=>{const [e,x,y,sz]=d;if(!sz)return;const s=document.createElement('div');s.className='deco';s.textContent=e;s.style.left=x+'px';s.style.top=y+'px';s.style.fontSize=sz+'px';bg.appendChild(s);});
})();
</script>
</body>
</html>
