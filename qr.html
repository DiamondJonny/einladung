<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR-Code · Geburtstagseinladung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --accent: #ff4f9a; --accent2: #7c5cff; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    font-family: 'Nunito', system-ui, sans-serif; color: #2b2b3a; overflow: hidden;
    background: linear-gradient(135deg, #fff0f6, #eef0ff 60%, #f3eaff);
  }

  /* aufsteigende Hintergrund-Luftballons */
  .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .balloon {
    position: absolute; bottom: -160px; width: 52px; height: 66px; border-radius: 50% 50% 48% 48%;
    animation: rise linear infinite; opacity: .8;
  }
  .balloon::after { content:""; position:absolute; left:50%; top:100%; width:1px; height:55px; background:rgba(0,0,0,.15); transform:translateX(-50%); }
  .balloon::before { content:""; position:absolute; left:26%; top:20%; width:13px; height:17px; background:rgba(255,255,255,.55); border-radius:50%; }
  @keyframes rise {
    0% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-60vh) translateX(20px) rotate(5deg); }
    100% { transform: translateY(-120vh) rotate(-5deg); }
  }

  .scene { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 6px; }
  /* seitliche Deko-Ballons */
  .side { font-size: 64px; line-height: 1; animation: bob 3s ease-in-out infinite; }
  .side.r { animation-delay: 1.2s; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-14px) rotate(4deg); } }

  .stack { display: flex; flex-direction: column; align-items: center; }
  .card {
    position: relative; background: #fff; border-radius: 26px; padding: 24px 24px 18px; max-width: 380px; width: 100%; text-align: center;
    box-shadow: 0 24px 70px rgba(124,92,255,.3);
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; border-radius: 26px 26px 0 0;
    background: linear-gradient(90deg, var(--accent), #ffb23e, #5be3a0, #48c6ff, var(--accent2));
  }
  h1 { font-family: 'Fredoka', sans-serif; font-size: 26px; margin: 6px 0 2px; }
  p.sub { color: #6b6b80; margin: 0 0 16px; font-size: 15px; }
  .qr { width: 100%; max-width: 300px; height: auto; display: block; margin: 0 auto; }
  .url { margin-top: 12px; font-size: 13px; color: #7a7a90; word-break: break-all; }

  /* Torte, auf der die Karte „steht" */
  .cake { font-size: 96px; line-height: 1; margin-top: -10px; filter: drop-shadow(0 8px 10px rgba(0,0,0,.15)); animation: bob 4s ease-in-out infinite; }

  .btns { position: relative; z-index: 1; margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  a.btn {
    font-family: 'Fredoka', sans-serif; text-decoration: none; font-weight: 600; font-size: 15px;
    padding: 10px 16px; border-radius: 12px; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 6px 18px rgba(124,92,255,.35);
  }
  a.btn.ghost { background: #fff; color: var(--accent2); border: 2px solid var(--accent2); box-shadow: none; }

  @media (max-width: 520px) { .side { font-size: 44px; } .cake { font-size: 74px; } }
  @media print {
    body { background: #fff; overflow: visible; }
    .bg, .btns { display: none; }
    .card { box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>

  <div>
    <div class="scene">
      <span class="side">🎈</span>
      <div class="stack">
        <div class="card">
          <h1>🎉 Scan mich!</h1>
          <p class="sub">QR-Code für die Geburtstagseinladung</p>
          <img class="qr" src="qr.svg" alt="QR-Code zur Geburtstagseinladung" />
          <div class="url">diamondjonny.github.io/einladung/</div>
        </div>
        <div class="cake">🎂</div>
      </div>
      <span class="side r">🎈</span>
    </div>
    <div class="btns">
      <a class="btn" href="qr.svg" download>SVG laden</a>
      <a class="btn ghost" href="qr.png" download>PNG laden</a>
    </div>
  </div>

<script>
(function () {
  const bg = document.getElementById('bg');
  const colors = ['#ff4f9a','#7c5cff','#ffb23e','#48c6ff','#5be3a0','#ff7b7b','#c77dff'];
  for (let i = 0; i < 14; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    const c = colors[i % colors.length];
    b.style.background = 'radial-gradient(circle at 30% 28%, #ffffffaa, ' + c + ' 60%)';
    b.style.left = ((i * 7) % 96) + '%';
    const dur = 13 + (i % 7) * 3;
    b.style.animationDuration = dur + 's';
    b.style.animationDelay = '-' + ((i * 2.1) % dur).toFixed(1) + 's';
    b.style.transform = 'scale(' + (0.7 + (i % 5) * 0.16).toFixed(2) + ')';
    bg.appendChild(b);
  }
})();
</script>
</body>
</html>
