<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poster · Geburtstagseinladung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent:#ff4f9a; --accent2:#7c5cff; }
  body { font-family:'Nunito',system-ui,sans-serif; }
  /* A4-Hochformat */
  .poster {
    position: relative; width: 1080px; height: 1528px; overflow: hidden;
    background: linear-gradient(180deg,#bfe6ff 0%, #e9d8ff 55%, #ffe1f0 100%);
  }
  .bg { position:absolute; inset:0; overflow:hidden; }
  .balloon { position:absolute; border-radius:50% 50% 48% 48%; }
  .balloon::after { content:""; position:absolute; left:50%; top:100%; width:2px; height:90px; background:rgba(0,0,0,.13); transform:translateX(-50%); }
  .balloon::before { content:""; position:absolute; left:26%; top:18%; width:22%; height:24%; background:rgba(255,255,255,.6); border-radius:50%; }

  .panel {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:760px; background:rgba(255,255,255,.95); border-radius:42px; padding:60px 56px 48px;
    text-align:center; box-shadow:0 40px 90px rgba(124,92,255,.3);
  }
  .panel::before { content:""; position:absolute; top:0; left:0; right:0; height:14px; border-radius:42px 42px 0 0;
    background:linear-gradient(90deg,var(--accent),#ffb23e,#5be3a0,#48c6ff,var(--accent2)); }
  .title { font-family:'Fredoka',sans-serif; font-weight:700; font-size:64px; line-height:1.1; margin-bottom:8px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:30px; color:#5a5a72; font-weight:700; margin-bottom:28px; }
  .qr { width:520px; height:520px; display:block; margin:0 auto; }
  .scan { font-family:'Fredoka',sans-serif; font-size:34px; font-weight:600; color:var(--accent2); margin-top:18px; }
  .cake { font-size:150px; line-height:1; margin-top:6px; filter:drop-shadow(0 12px 14px rgba(0,0,0,.18)); }
  .url { font-size:24px; color:#8a8aa0; margin-top:6px; }
</style>
</head>
<body>
  <div class="poster" id="poster">
    <div class="bg" id="bg"></div>
    <div class="panel">
      <div class="title">🎉 Du bist eingeladen! 🎉</div>
      <div class="sub">zu meiner Geburtstagsfeier</div>
      <img class="qr" src="qr.svg" alt="QR-Code" />
      <div class="scan">📷 Scan mich für deine Einladung!</div>
      <div class="url">diamondjonny.github.io/einladung</div>
      <div class="cake">🎂</div>
    </div>
  </div>
<script>
(function(){
  const bg=document.getElementById('bg');
  const colors=['#ff4f9a','#7c5cff','#ffb23e','#48c6ff','#5be3a0','#ff7b7b','#c77dff','#ff8fc8'];
  // Streut bunte Luftballons über den ganzen Hintergrund
  const spots=[[40,120,150],[180,520,120],[60,950,170],[150,1320,130],[860,90,170],[940,470,130],[820,900,150],[900,1300,160],[470,40,120],[520,1430,120],[300,260,90],[700,260,90],[250,1120,90],[760,1150,90]];
  spots.forEach((s,i)=>{
    const [x,y,w]=s; const b=document.createElement('div'); b.className='balloon';
    const c=colors[i%colors.length];
    b.style.background='radial-gradient(circle at 30% 28%, #ffffffbb, '+c+' 62%)';
    b.style.left=x+'px'; b.style.top=y+'px'; b.style.width=w+'px'; b.style.height=(w*1.25)+'px';
    b.style.transform='rotate('+((i%5)-2)*4+'deg)'; b.style.opacity=(0.78+(i%3)*0.07).toFixed(2);
    bg.appendChild(b);
  });
})();
</script>
</body>
</html>
